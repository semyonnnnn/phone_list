<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Телефонный справочник Свердловскстата</title>
    <link rel="stylesheet" href="./styles/main.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>
    <h1>📇 Телефонный справочник (эталон + обновление из Excel)</h1>
    <div class="upload-container">
        <label for="excel-file">Загрузите файл Excel (.xlsx) с обновлёнными телефонами:</label>
        <input type="file" id="excel-file" accept=".xlsx, .xls">
        <div class="download-section">
            <button id="downloadBtn">⬇ Скачать справочник (Word)</button>
        </div>
    </div>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="🔍 Поиск по ФИО..." autocomplete="off">
        <button id="clear-search">✖ Сбросить</button>
    </div>
    <div id="preview" class="preview">
        <h3>Сгенерированный справочник</h3>
        <div id="directory-content" class="directory-content">Загрузите файл для построения справочника</div>
    </div>
    <script src="./js/script.js"></script>
</body>

</html>
